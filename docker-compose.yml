version: '3.8'

services:
  smart-audit:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # Optional: Redis for caching (future feature)
  # redis:
  #   image: redis:alpine
  #   ports:
  #     - "6379:6379"
